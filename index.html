<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Hour — Twin Cities Happy Hours</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --cream:#FAF6EF; --cream-dk:#F0E9DC; --green:#243D1A; --green-lt:#3A5C28;
      --sienna:#C4622D; --amber:#D4953A; --berry:#7A3050; --blush:#E8C4B0;
      --ink:#1A1410; --ink-lt:#5A4A3A; --card:#FFFFFF; --shadow:rgba(36,61,26,.10);
      --radius:14px; --map-width: 45%; 
      --filter-h: 180px; /* Initial Height */
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { flex-shrink: 0; background:#1A1428; position: relative; z-index: 10; }
    .header-inner { padding: 2rem; text-align:center; }
    header h1 { font-family:'Playfair Display',serif; font-size: 2.5rem; color:var(--cream); }
    header h1 em { color:var(--header-accent, var(--amber)); }

    /* ── DYNAMIC FILTER BAR ────────────────────────────────── */
    .filters-outer {
      flex-shrink: 0;
      background: var(--cream);
      border-bottom: 1px solid var(--cream-dk);
      z-index: 1000;
      overflow: hidden;
      transition: height 0.1s linear; /* Short transition for smooth manual scroll */
    }

    .filter-content { padding: 1rem 1.5rem; }
    
    /* ── CONTENT AREA ──────────────────────────────────────── */
    .content-area {
      flex-grow: 1;
      display: flex;
      overflow: hidden; /* Important: The container doesn't scroll, the panels do */
      position: relative;
    }

    .map-panel { flex: 0 0 var(--map-width); height: 100%; position: relative; }
    #map { width: 100%; height: 100%; background: var(--cream-dk); }

    .resizer {
      width: 6px;
      background: var(--cream-dk);
      cursor: col-resize;
      transition: background 0.2s;
      z-index: 10;
    }
    .resizer:hover { background: var(--amber); }

    .list-panel {
      flex: 1;
      overflow-y: auto;
      height: 100%;
      -webkit-overflow-scrolling: touch;
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 1rem; 
      padding: 1rem;
      padding-bottom: 100px; /* Space for FAB */
    }

    @media (max-width: 899px) {
      .map-panel { display: none; }
      .resizer { display: none; }
      .content-area.map-active .map-panel { display: block; flex: 0 0 100%; position: absolute; inset: 0; z-index: 5; }
      .content-area.map-active .list-panel { display: none; }
    }

    /* ── UI ELEMENTS ───────────────────────────────────────── */
    .card { background: #fff; border-radius: var(--radius); padding: 1.2rem; border: 1px solid var(--cream-dk); cursor: pointer; }
    .fab { position: fixed; bottom: 20px; right: 20px; z-index: 100; padding: 12px 24px; border-radius: 50px; background: var(--green); color: #fff; border: none; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <h1><em>Golden</em> Hour</h1>
    </div>
  </header>

  <div class="filters-outer" id="filters-outer">
    <div class="filter-content" id="filter-content">
      <input type="text" id="search" placeholder="Search..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
      <div style="margin-top:10px; font-size:0.8rem; color:#666;">
        Scroll to collapse • Pull up to expand
      </div>
    </div>
  </div>

  <div class="content-area" id="content-area">
    <div class="map-panel" id="map-panel">
      <div id="map"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="list-panel" id="list-panel">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <button class="fab" id="fab">Map</button>

  <script>
    let VENUES = [];
    let mapMode = false;
    let leafletMap = null;
    let lastScrollY = 0;
    const filterBar = document.getElementById('filters-outer');
    const listPanel = document.getElementById('list-panel');
    const initialFilterHeight = 110; // Adjust based on your content

    function init() {
      Papa.parse('happyhours.csv', {
        download: true, header: true,
        complete: function(results) {
          VENUES = results.data.filter(r => r.name);
          render();
          setupResizer();
          setupScrollLogic();
        }
      });
    }

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = VENUES.map(v => `
        <div class="card">
          <h3>${v.name}</h3>
          <p>${v.neighborhood}</p>
        </div>
      `).join('');
    }

    // ── SMOOTH SCROLL LOGIC ──────────────────────────────────
    function setupScrollLogic() {
      listPanel.addEventListener('scroll', () => {
        const currentScrollY = listPanel.scrollTop;
        const delta = currentScrollY - lastScrollY;

        // Determine target height
        let currentHeight = filterBar.offsetHeight;
        
        if (delta > 0 && currentScrollY > 20) {
          // Scrolling Down: Collapse
          filterBar.style.height = '0px';
        } else if (delta < -10 || currentScrollY <= 5) {
          // Scrolling Up or at Top: Expand
          filterBar.style.height = initialFilterHeight + 'px';
        }

        lastScrollY = currentScrollY;
      });
    }

    // ── RESIZER ──────────────────────────────────────────────
    function setupResizer() {
      const resizer = document.getElementById('resizer');
      let isDragging = false;

      resizer.addEventListener('mousedown', () => { isDragging = true; });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let p = (e.clientX / window.innerWidth) * 100;
        if (p > 20 && p < 80) {
          document.documentElement.style.setProperty('--map-width', p + '%');
          if (leafletMap) leafletMap.invalidateSize();
        }
      });
      document.addEventListener('mouseup', () => { isDragging = false; });
    }

    function toggleMapMode() {
      mapMode = !mapMode;
      document.getElementById('content-area').classList.toggle('map-active');
      document.getElementById('fab').textContent = mapMode ? 'List' : 'Map';
      if (mapMode && !leafletMap) {
        leafletMap = L.map('map').setView([44.9778, -93.2650], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(leafletMap);
      }
      setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 300);
    }

    document.getElementById('fab').addEventListener('click', toggleMapMode);
    window.onload = init;
  </script>
</body>
</html>
