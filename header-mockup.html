<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pours — Header Theme Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    font-family: 'DM Sans', sans-serif;
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 3rem;
    align-items: center;
  }

  .label {
    color: rgba(255,255,255,.45);
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: .75rem;
    text-align: center;
  }
  .sublabel {
    color: rgba(255,255,255,.25);
    font-size: .65rem;
    letter-spacing: .1em;
    text-align: center;
    margin-top: .4rem;
  }

  .card {
    width: 100%;
    max-width: 680px;
  }

  /* ── HEADER BLOCK ── */
  .hdr {
    padding: 2.2rem 2.5rem 2rem;
    text-align: center;
    border-radius: 14px;
    overflow: hidden;
  }
  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #BF2338;
    margin-bottom: .2rem;
  }
  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6.5rem;
    line-height: 1;
    letter-spacing: .04em;
    display: block;
  }
  .tagline {
    font-size: .9rem;
    margin-top: .25rem;
    letter-spacing: .02em;
  }

  /* ── STANDARD ── */
  .hdr-standard {
    background: #FAF6EF;
  }
  .hdr-standard .wordmark {
    color: #060f1e;
  }
  .hdr-standard .tagline {
    color: rgba(36,20,10,.45);
  }

  /* ── MORNING ── */
  .hdr-morning {
    background: #FAF6EF;
  }
  .hdr-morning .wordmark {
    color: #060f1e;
    text-shadow:
      0 0 4px  rgba(180,220,255,.80),
      0 0 25px rgba(80,150,220,.78),
      0 0 70px rgba(50,100,180,.58),
      0 0 130px rgba(30,60,140,.38);
  }
  .hdr-morning .eyebrow {
    text-shadow: 0 0 10px rgba(80,150,220,.38);
  }
  .hdr-morning .tagline {
    color: rgba(36,20,10,.45);
  }

  /* ── NIGHT ── */
  .hdr-night {
    background: #1a0d0a;
  }
  .hdr-night .eyebrow {
    text-shadow: 0 0 10px rgba(191,35,56,.60);
  }
  .hdr-night .wordmark {
    color: #FAF6EF;
    text-shadow:
      0 0 4px  rgba(255,190,120,.90),
      0 0 15px rgba(191,35,56,.80),
      0 0 40px rgba(191,35,56,.55),
      0 0 80px rgba(191,35,56,.30);
  }
  .hdr-night .tagline {
    color: rgba(250,246,239,.45);
  }
</style>
</head>
<body>

  <div class="card">
    <div class="label">Standard · Day</div>
    <div class="hdr hdr-standard">
      <div class="eyebrow">Twin Cities</div>
      <span class="wordmark">Pours</span>
      <div class="tagline">Happy hours, hand picked.</div>
    </div>
    <div class="sublabel">12:00 pm – 7:00 pm &nbsp;·&nbsp; no glow</div>
  </div>

  <div class="card">
    <div class="label">Morning</div>
    <div class="hdr hdr-morning">
      <div class="eyebrow">Twin Cities</div>
      <span class="wordmark">Pours</span>
      <div class="tagline">Happy hours, hand picked.</div>
    </div>
    <div class="sublabel">7:00 am – 11:00 am &nbsp;·&nbsp; blue-dawn glow</div>
  </div>

  <div class="card">
    <div class="label">Night</div>
    <div class="hdr hdr-night">
      <div class="eyebrow">Twin Cities</div>
      <span class="wordmark">Pours</span>
      <div class="tagline">Happy hours, hand picked.</div>
    </div>
    <div class="sublabel">8:00 pm – 6:00 am &nbsp;·&nbsp; crimson neon glow</div>
  </div>

</body>
</html>
